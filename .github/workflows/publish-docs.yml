# Publishes the docs (README + llms.txt + docs/spec.md) from this private
# repo to a separate *public* repo that has GitHub Pages enabled.
#
# Manual setup (one-time):
#   1. Create a new PUBLIC repo on GitHub, e.g. `decision-docs`.
#   2. Generate a Personal Access Token (fine-grained):
#        - Repository access: "Only select repositories" → the new public repo.
#        - Permissions → Repository → Contents = Read and write.
#      Copy the token.
#   3. In *this* repo's Settings → Secrets → Actions, add:
#        - `DOCS_REPO`  =  `<your-username>/<public-repo-name>`
#        - `DOCS_TOKEN` =  <the PAT from step 2>
#   4. In the public repo's Settings → Pages, set source = "Deploy from a
#      branch", branch = `main`, folder = `/ (root)`. Jekyll renders the
#      markdown automatically — no theme config needed for a basic site.
#
# After the next push to main, the public repo gets the docs and Pages serves
# them at https://<username>.github.io/<public-repo-name>/.

name: Publish docs

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "llms.txt"
      - "docs/**"
      - ".github/workflows/publish-docs.yml"
  workflow_dispatch:

jobs:
  publish:
    name: Sync docs to public repo
    runs-on: ubuntu-latest
    if: ${{ vars.DOCS_REPO != '' || secrets.DOCS_REPO != '' }}
    steps:
      - name: Checkout this (private) repo
        uses: actions/checkout@v4

      - name: Checkout public docs repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DOCS_REPO }}
          token: ${{ secrets.DOCS_TOKEN }}
          path: public-docs
          fetch-depth: 0

      - name: Copy docs into public repo
        run: |
          set -euo pipefail
          # Wipe what we manage, keep the public repo's own `.git` and any
          # files outside our scope (e.g., custom landing page) untouched.
          rm -f  public-docs/README.md public-docs/llms.txt
          rm -rf public-docs/docs

          cp README.md  public-docs/README.md
          cp llms.txt   public-docs/llms.txt
          mkdir -p      public-docs/docs
          cp -r docs/*  public-docs/docs/

          # Optional: minimal Jekyll config so heading anchors work out of the
          # box. Comment out if you don't want it.
          cat > public-docs/_config.yml <<'EOF'
          theme: jekyll-theme-minimal
          title: decision
          description: Tauri desktop app for facilitating structured team decisions.
          markdown: kramdown
          plugins:
            - jekyll-relative-links
          relative_links:
            enabled: true
            collections: true
          include:
            - CNAME
            - llms.txt
          EOF

      - name: Commit & push to public docs repo
        run: |
          cd public-docs
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No doc changes; nothing to publish."
            exit 0
          fi
          git add -A
          git commit -m "docs: sync from $GITHUB_REPOSITORY@${GITHUB_SHA::7}"
          git push
